# Split Configuration File
# Format: INI-Style mit [Sections] und Key=Value Paaren
# Leer gelassene oder (Skip) gekennzeichnete Kanäle werden nicht erstellt

[Channels]
1 = Kick
2 = Snare
3 = (Skip)
4 = Tom 1
5 = Tom 2
6 = Tom 3
7 = OH 1
8 = OH 2
13 = Bass
24 = Git

[Options]
# Neu: Parallele Verarbeitung
ParallelProcessing = true
MaxParallelJobs = 8
# OutputFormat: wav (standard), mp3, flac, etc.
OutputFormat = wav
# BasePath: Pfad zum Ordner mit den Live-Aufnahmen
BasePath = X_LIVE
# SampleRate: auto (aus Quelle), oder spezifische Rate wie 48000, 44100
SampleRate = auto
# BitDepth: auto (aus Quelle), 16, 24, 32
BitDepth = auto
# VerboseOutput: true/false für detaillierte Logs
VerboseOutput = true
# CreateSubfolderForChannels: true = Kanäle in Subfolder, false = im gleichen Ordner
CreateSubfolderForChannels = false